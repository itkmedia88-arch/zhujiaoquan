<!doctype html><html lang='zh-CN'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1.0'><link rel='icon' href='data:,'><title>抖音对标账号管理系统</title><style>:root{font-family:Inter,PingFang SC,Microsoft YaHei,Arial,sans-serif;color:#eef8f5;background:#071313}*{box-sizing:border-box}body{margin:0;min-width:320px}button,input,textarea{font:inherit}button{cursor:pointer;border:1px solid #2f6b64;background:#0b5d54;color:#f5fffc;border-radius:8px;min-height:38px;padding:0 12px}button.ghost{background:#102123;color:#cfe9e4}button.danger{background:#3b1719;border-color:#8b3d43}button:disabled{opacity:.55;cursor:not-allowed}a{color:#5be8ca}.shell{min-height:100vh;padding:22px;background:linear-gradient(135deg,#092423,#071014 55%,#12141b)}.top{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:16px;align-items:start;border-bottom:1px solid #295a55;padding-bottom:18px}.top h1{margin:0 0 8px;font-size:34px;line-height:1.1}.top p{margin:0;color:#a8c6c0;line-height:1.55}.actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}.notice{margin-top:12px;padding:10px 12px;border:1px solid #7b6424;background:#2b250f;border-radius:8px;color:#f4d36e}.layout{display:grid;grid-template-columns:240px minmax(0,1fr);gap:18px;margin-top:18px}.side,.panel,.card,.modal{background:#081b1f;border:1px solid #1f4b47;border-radius:8px}.side{padding:14px;height:fit-content;position:sticky;top:14px}.side h2,.panel h2{font-size:16px;margin:0 0 12px}.account{width:100%;display:flex;justify-content:space-between;gap:8px;text-align:left;background:#0d2529;margin:8px 0;padding:10px;border-color:#214842}.account.active{border-color:#5be8ca;box-shadow:0 0 0 1px #5be8ca55}.account small{display:block;color:#83aaa3;margin-top:5px}.main{display:grid;gap:16px;min-width:0}.kpis{display:grid;grid-template-columns:repeat(5,minmax(110px,1fr));gap:12px}.kpi{padding:14px;border-top:2px solid #5be8ca}.kpi span{color:#8fb7b0;font-size:13px}.kpi strong{display:block;font-size:26px;margin-top:8px;color:#fff}.grid{display:grid;grid-template-columns:minmax(0,1.25fr) minmax(260px,.75fr);gap:16px}.panel{padding:16px}.bars{display:grid;gap:9px}.bar{display:grid;grid-template-columns:minmax(0,1fr) 92px;gap:10px;align-items:center}.bar label{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#dff5f1}.track{height:12px;background:#112d31;border-radius:999px;overflow:hidden}.fill{height:100%;background:linear-gradient(90deg,#5be8ca,#f4d36e)}.radar{display:grid;gap:12px}.radarRow{display:grid;grid-template-columns:74px minmax(0,1fr) 38px;gap:10px;align-items:center}.cards{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}.card{padding:14px;line-height:1.7}.card h3{margin:0 0 8px;color:#5be8ca;font-size:15px}.tableWrap{overflow:auto}table{border-collapse:collapse;width:100%;min-width:860px}th,td{padding:10px;border-bottom:1px solid #173d3b;text-align:left;vertical-align:top}th{color:#9fc5bf;font-weight:600}td{color:#e4f3f0}.caption{width:38%;line-height:1.55}.empty{padding:44px;text-align:center;color:#a8c6c0}.modalBack{position:fixed;inset:0;display:none;place-items:center;background:#0009;padding:18px;z-index:20}.modalBack.open{display:grid}.modal{width:min(820px,100%);padding:18px;box-shadow:0 22px 70px #0008}.modalHead,.modalFoot{display:flex;align-items:center;justify-content:space-between;gap:10px}.form{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin-top:12px}.form label{display:grid;gap:6px;color:#9fc5bf;font-size:13px}.form input,.form textarea,.form select{width:100%;border:1px solid #28504c;background:#071417;color:#ecfffb;border-radius:8px;padding:10px}.form textarea{grid-column:1/-1;min-height:210px;resize:vertical;line-height:1.5}.modalFoot{margin-top:12px}.msg{color:#f4d36e}@media(max-width:950px){.layout,.grid{grid-template-columns:1fr}.side{position:static}.kpis{grid-template-columns:repeat(2,minmax(0,1fr))}.cards{grid-template-columns:1fr}.top{grid-template-columns:1fr}.actions{justify-content:flex-start}}@media(max-width:560px){.shell{padding:14px}.top h1{font-size:28px}.kpis,.form{grid-template-columns:1fr}}</style></head><body><div class='shell'><header class='top'><div><h1>抖音对标账号管理系统</h1><p>网页简易版：可直接导入 CSV/JSON，在浏览器本地生成账号看板。飞书同步和自动采集需要后端，网页端先不启用。</p><div class='notice'>导入的数据只保存在你当前浏览器的本地存储里，不会自动传到服务器。</div></div><div class='actions'><button id='importBtn'>导入 CSV/JSON</button><button class='ghost' id='exportBtn'>导出当前账号</button><button class='danger' id='deleteBtn'>删除当前账号</button></div></header><div class='layout'><aside class='side'><h2>账号列表</h2><div id='accounts'></div></aside><main class='main' id='main'><div class='empty'>正在加载数据...</div></main></div></div><div class='modalBack' id='modal'><div class='modal'><div class='modalHead'><h2>导入账号数据</h2><button class='ghost' id='closeBtn'>关闭</button></div><div class='form'><label>账号名<input id='nameInput' value='网页导入账号'></label><label>格式<select id='formatInput'><option value='csv'>CSV</option><option value='json'>JSON</option></select></label><label>主页链接<input id='urlInput' placeholder='https://www.douyin.com/user/...'></label><label>粉丝数<input id='fansInput' type='number' value='0'></label><label>总点赞<input id='likesInput' type='number' value='0'></label><label>选择文件<input id='fileInput' type='file' accept='.csv,.json,text/csv,application/json'></label><textarea id='dataInput' placeholder='CSV 示例：videoUrl,caption,likeCount,commentCount,saveCount,shareCount,durationSeconds,publishedAt'></textarea></div><div class='modalFoot'><span class='msg' id='msg'></span><button id='runImport'>生成看板</button></div></div></div><script>const storeKey='douyin-web-imported-accounts';const deletedKey='douyin-web-deleted-accounts';let seed=[];let imported=JSON.parse(localStorage.getItem(storeKey)||'[]');let deleted=JSON.parse(localStorage.getItem(deletedKey)||'[]');let current='';const $=id=>document.getElementById(id);const esc=v=>String(v??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/'/g,'&#39;');const num=v=>Number(String(v??0).replace(/[,，]/g,''))||0;const fmt=n=>Intl.NumberFormat('zh-CN',{notation:num(n)>=10000?'compact':'standard',maximumFractionDigits:1}).format(num(n));const total=v=>num(v.likeCount)+num(v.commentCount)+num(v.saveCount)+num(v.shareCount);function csv(text){const q=String.fromCharCode(34);let rows=[],row=[],cell='',inside=false;for(let i=0;i<text.length;i++){let c=text[i],n=text[i+1];if(c===q){if(inside&&n===q){cell+=q;i++}else inside=!inside}else if(c===','&&!inside){row.push(cell);cell=''}else if((c===String.fromCharCode(10)||c===String.fromCharCode(13))&&!inside){if(c===String.fromCharCode(13)&&n===String.fromCharCode(10))i++;row.push(cell);if(row.some(x=>x.trim()))rows.push(row);row=[];cell=''}else cell+=c}row.push(cell);if(row.some(x=>x.trim()))rows.push(row);if(rows.length<2)return[];const heads=rows.shift().map(x=>x.trim());return rows.map(r=>Object.fromEntries(heads.map((h,i)=>[h,r[i]??''])))}function normalizeRows(rows){return rows.map((r,i)=>{let o={};for(const [k,v] of Object.entries(r))o[k.toLowerCase().trim()]=v;const pick=(...ks)=>{for(const k of ks){if(o[k.toLowerCase()]!=null&&o[k.toLowerCase()]!=='')return o[k.toLowerCase()]}return''};return{id:'import_'+Date.now()+'_'+i,videoUrl:pick('videoUrl','url','link','视频链接'),downloadUrl:pick('downloadUrl','download','下载链接'),caption:pick('caption','title','desc','copy','文案','标题'),likeCount:num(pick('likeCount','likes','点赞','点赞数')),commentCount:num(pick('commentCount','comments','评论','评论数')),saveCount:num(pick('saveCount','collectCount','favorites','收藏','收藏数')),shareCount:num(pick('shareCount','shares','分享','分享数')),durationSeconds:num(pick('durationSeconds','duration','时长')),publishedAt:pick('publishedAt','date','发布时间')}}).filter(v=>v.caption||v.videoUrl)}function readInput(){const text=$('dataInput').value.trim();if(!text)throw Error('请先粘贴 CSV/JSON 内容，或选择文件');if($('formatInput').value==='json'){const data=JSON.parse(text);if(Array.isArray(data))return normalizeRows(data);if(Array.isArray(data.videos))return normalizeRows(data.videos);if(data.account&&Array.isArray(data.videos))return normalizeRows(data.videos);if(Array.isArray(data.accounts))return data.accounts}else return normalizeRows(csv(text));throw Error('JSON 里没有找到 videos 或 accounts')}function analyze(videos){const all=videos.map(v=>v.caption).join(' ');const tags=['AI','Codex','副业','成长','日本','口播','教程','电商','女性','认知'].filter(k=>all.includes(k));const avg=videos.length?videos.reduce((s,v)=>s+total(v),0)/videos.length:0;const save=videos.reduce((s,v)=>s+num(v.saveCount),0);const share=videos.reduce((s,v)=>s+num(v.shareCount),0);return{trackPositioning:`${tags.slice(0,4).join('、')||'内容'}方向账号，适合用爆款样本反推选题、标题和转化入口。`,personaPositioning:'网页端根据文案和互动数据生成初步判断，适合先做账号筛选和选题复盘。',businessModel:'可承接到课程、社群、咨询、资料包、工具模板或服务成交，具体要结合主页和评论区验证。',titlePattern:'优先观察高互动视频的开头关键词、强判断句和具体结果承诺。',copyStructure:'建议按痛点开场、观点判断、案例证明、步骤拆解、行动引导五段复盘。',writingStyle:'高收藏内容通常更适合做教程、清单、避坑和可复用模板。',radar:{content:Math.min(95,45+videos.length*3),conversion:Math.min(95,45+save/Math.max(1,videos.length)/300),trust:70,consistency:tags.length?78:62,spread:Math.min(98,45+share/Math.max(1,videos.length)/250)},recommendations:{topic:'把高互动视频归成 3 个系列，优先复刻收藏和分享都高的主题。',title:'标题里保留人群、场景、结果和反常识判断，不要只写泛泛感受。',copy:'每条内容补一个可执行步骤或清单，提高收藏率。',interaction:'评论区用选择题收集需求，再反推下一批选题。'}}}function build(name,url,fans,likes,videos){const id='local_'+Date.now();const avg=videos.length?videos.reduce((s,v)=>s+total(v),0)/videos.length:0;return{account:{id,name,profileUrl:url,fanCount:num(fans),totalLikeCount:num(likes),sampleVideoCount:videos.length,averageEngagement:avg,overallScore:Math.min(100,Math.round(35+Math.log10(avg+1)*14+videos.length)),createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()},analysis:analyze(videos),videos:videos.map(v=>({...v,accountId:id}))}}function allAccounts(){return[...imported,...seed].filter(x=>!deleted.includes(x.account.id))}function renderList(){const list=allAccounts();$('accounts').innerHTML=list.map(x=>`<button class='account ${x.account.id===current?'active':''}' onclick='selectAccount(${JSON.stringify(x.account.id)})'><span>${esc(x.account.name)}<small>${x.account.sampleVideoCount||x.videos.length} 条样本</small></span><b>${x.account.overallScore||0}</b></button>`).join('')||'<p class=empty>暂无账号</p>'}function selectAccount(id){current=id;render()}function render(){const list=allAccounts();if(!current&&list[0])current=list[0].account.id;renderList();const item=list.find(x=>x.account.id===current);if(!item){$('main').innerHTML='<div class=empty>暂无数据，点击右上角导入 CSV/JSON。</div>';return}const a=item.account,v=item.videos||[],an=item.analysis||analyze(v),top=[...v].sort((x,y)=>total(y)-total(x)).slice(0,8),max=Math.max(1,...top.map(total));$('main').innerHTML=`<section class='kpis'><div class='kpi'><span>粉丝数</span><strong>${fmt(a.fanCount)}</strong></div><div class='kpi'><span>总点赞</span><strong>${fmt(a.totalLikeCount)}</strong></div><div class='kpi'><span>样本数</span><strong>${v.length}</strong></div><div class='kpi'><span>平均互动</span><strong>${fmt(a.averageEngagement)}</strong></div><div class='kpi'><span>综合分</span><strong>${a.overallScore||0}</strong></div></section><section class='grid'><div class='panel'><h2>高互动视频</h2><div class='bars'>${top.map(x=>`<div class='bar'><label>${esc(x.caption||x.videoUrl)}</label><div class='track'><div class='fill' style='width:${Math.max(4,total(x)/max*100)}%'></div></div><b>${fmt(total(x))}</b></div>`).join('')}</div></div><div class='panel'><h2>账号雷达</h2><div class='radar'>${Object.entries(an.radar||{}).map(([k,val])=>`<div class='radarRow'><span>${esc(k)}</span><div class='track'><div class='fill' style='width:${val}%'></div></div><b>${Math.round(val)}</b></div>`).join('')}</div></div></section><section class='cards'><div class='card'><h3>赛道定位</h3><p>${esc(an.trackPositioning)}</p></div><div class='card'><h3>人设定位</h3><p>${esc(an.personaPositioning)}</p></div><div class='card'><h3>变现方向</h3><p>${esc(an.businessModel)}</p></div><div class='card'><h3>标题模式</h3><p>${esc(an.titlePattern)}</p></div><div class='card'><h3>文案结构</h3><p>${esc(an.copyStructure)}</p></div><div class='card'><h3>写作风格</h3><p>${esc(an.writingStyle)}</p></div></section><section class='panel'><h2>优化建议</h2><div class='cards'>${Object.entries(an.recommendations||{}).map(([k,val])=>`<div class='card'><h3>${esc(k)}</h3><p>${esc(val)}</p></div>`).join('')}</div></section><section class='panel'><h2>样本视频</h2><div class='tableWrap'><table><thead><tr><th>文案</th><th>点赞</th><th>评论</th><th>收藏</th><th>分享</th><th>发布时间</th><th>链接</th></tr></thead><tbody>${v.map(x=>`<tr><td class='caption'>${esc(x.caption)}</td><td>${fmt(x.likeCount)}</td><td>${fmt(x.commentCount)}</td><td>${fmt(x.saveCount)}</td><td>${fmt(x.shareCount)}</td><td>${esc(x.publishedAt)}</td><td>${x.videoUrl?`<a href='${esc(x.videoUrl)}' target='_blank'>打开</a>`:''}</td></tr>`).join('')}</tbody></table></div></section>`}function save(){localStorage.setItem(storeKey,JSON.stringify(imported));localStorage.setItem(deletedKey,JSON.stringify(deleted))}$('importBtn').onclick=()=>{$('modal').classList.add('open');$('msg').textContent=''};$('closeBtn').onclick=()=>$('modal').classList.remove('open');$('fileInput').onchange=e=>{const f=e.target.files[0];if(!f)return;$('formatInput').value=f.name.endsWith('.json')?'json':'csv';const r=new FileReader();r.onload=()=>$('dataInput').value=r.result;r.readAsText(f)};$('runImport').onclick=()=>{try{const data=readInput();if(data[0]&&data[0].account&&data[0].videos){imported=[...data,...imported]}else{imported=[build($('nameInput').value||'网页导入账号',$('urlInput').value,$('fansInput').value,$('likesInput').value,data),...imported]}save();current=imported[0].account.id;$('modal').classList.remove('open');render()}catch(e){$('msg').textContent=e.message}};$('deleteBtn').onclick=()=>{if(!current)return;imported=imported.filter(x=>x.account.id!==current);if(seed.some(x=>x.account.id===current))deleted.push(current);current='';save();render()};$('exportBtn').onclick=()=>{const item=allAccounts().find(x=>x.account.id===current);if(!item)return;const blob=new Blob([JSON.stringify(item,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=(item.account.name||'account')+'.json';a.click();URL.revokeObjectURL(a.href)};fetch('./douyin-benchmark.json').then(r=>r.json()).then(d=>{seed=Array.isArray(d.accounts)?d.accounts:[];render()}).catch(()=>{seed=[];render()});</script></body></html>
